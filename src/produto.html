<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Detalhes do Produto - Love Pet</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet" />

<style>
.font-poppins { font-family: 'Poppins', sans-serif; }
.bg-heart { background-color: #FF4B4B; }
.text-heart { color: #FF4B4B; }
.hover-heart:hover { background-color: #FF3333; }

.loading {
  text-align: center;
  padding: 28px;
  color: #666;
}

.error-message {
  background-color: #fee;
  border: 1px solid #fcc;
  color: #c33;
  padding: 16px;
  border-radius: 8px;
}
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-heart shadow-md">
  <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between gap-4">
    <a href="pet.html#produtos" class="flex items-center gap-3 text-white">
      <span class="w-14 h-14 bg-white rounded-full overflow-hidden border-2 border-white">
        <img src="https://i.pinimg.com/1200x/53/a7/2a/53a72a40a84a32547868f66214908c0c.jpg" class="object-cover w-full h-full" alt="Logo" />
      </span>
      <span class="text-2xl font-poppins font-bold">Love Pet</span>
    </a>
    <a href="pet.html#produtos" class="bg-white text-heart px-4 py-2 rounded font-semibold hover:opacity-90 transition">Voltar</a>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">
  <div id="produtoDetalhe" class="bg-white rounded-lg shadow-md p-5 md:p-8">
    <div class="loading">Carregando produto...</div>
  </div>
</main>

<script>
const API_PROD = "http://localhost:8080/api/produtos";
const DEFAULT_IMAGE = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FF4B4B'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E";

async function fetchAPI(url, options = {}) {
  const response = await fetch(url, options);

  if (!response.ok) {
    let errorMessage = `Erro ${response.status}: ${response.statusText}`;
    if (response.status === 404) errorMessage = "Produto nao encontrado.";
    if (response.status === 500) errorMessage = "Erro interno no servidor.";
    throw new Error(errorMessage);
  }

  const text = await response.text();
  if (!text || text.trim() === "") return null;
  return JSON.parse(text);
}

function getProdutoId(produto) {
  return produto.idProdutos || produto.id || produto.idProduto || produto.id_produtos;
}

function getCategoriaNome(produto) {
  if (!produto.categoria) return "Sem categoria";
  return produto.categoria.nome || produto.categoria.descricao || "Sem categoria";
}

function formatarMoeda(valor) {
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number(valor || 0));
}

function isValidImageUrl(url) {
  return url && url !== "null" && url !== "undefined" && url.trim() !== "";
}

function getValidImageUrl(url) {
  return isValidImageUrl(url) ? url : DEFAULT_IMAGE;
}

function escapeHtml(text) {
  if (text === null || text === undefined) return "";
  const div = document.createElement("div");
  div.textContent = String(text);
  return div.innerHTML;
}

function renderProduto(produto) {
  const detalhe = document.getElementById("produtoDetalhe");
  const preco = Number(produto.preco || 0);
  const precoDesconto = Number(produto.preco_desconto || preco);
  const estoque = Number(produto.qtd_estoque || produto.estoque || 0);
  const disponivel = estoque > 0;

  detalhe.innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div>
        <img src="${getValidImageUrl(produto.imagem)}" class="w-full aspect-square object-cover rounded-lg border" alt="${escapeHtml(produto.nome)}" onerror="this.src='${DEFAULT_IMAGE}'">
      </div>
      <section class="flex flex-col gap-5">
        <div>
          <p class="text-sm font-semibold text-heart uppercase">Produto #${escapeHtml(getProdutoId(produto))}</p>
          <h1 class="text-3xl md:text-4xl font-poppins font-bold text-gray-900 mt-1">${escapeHtml(produto.nome)}</h1>
          <p class="text-gray-600 mt-3">${escapeHtml(produto.descricao) || "Produto sem descricao cadastrada."}</p>
        </div>

        <div class="border-t border-b py-5">
          ${precoDesconto && precoDesconto < preco ? `<p class="text-gray-500 line-through">${formatarMoeda(preco)}</p>` : ""}
          <p class="text-3xl font-bold text-heart">${formatarMoeda(precoDesconto || preco)}</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="border rounded-lg p-4">
            <p class="text-sm text-gray-500">Categoria</p>
            <p class="font-semibold text-gray-900">${escapeHtml(getCategoriaNome(produto))}</p>
          </div>
          <div class="border rounded-lg p-4">
            <p class="text-sm text-gray-500">Quantidade em estoque</p>
            <p class="font-semibold ${disponivel ? "text-green-700" : "text-red-600"}">${estoque} unidade(s)</p>
          </div>
        </div>

        <div class="${disponivel ? "bg-green-50 border-green-200 text-green-800" : "bg-red-50 border-red-200 text-red-700"} border rounded-lg p-4">
          ${disponivel ? "Produto disponivel para compra." : "Produto sem estoque no momento."}
        </div>

        <button type="button" ${disponivel ? "" : "disabled"} class="bg-heart text-white px-5 py-3 rounded font-semibold hover-heart transition disabled:bg-gray-300 disabled:cursor-not-allowed">
          Comprar
        </button>
      </section>
    </div>
  `;
}

async function carregarProduto() {
  const detalhe = document.getElementById("produtoDetalhe");
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    detalhe.innerHTML = '<div class="error-message">ID do produto nao informado.</div>';
    return;
  }

  try {
    detalhe.innerHTML = '<div class="loading">Carregando produto...</div>';
    const produto = await fetchAPI(`${API_PROD}/${encodeURIComponent(id)}`);

    if (!produto) {
      detalhe.innerHTML = '<div class="error-message">Produto nao encontrado.</div>';
      return;
    }

    renderProduto(produto);
  } catch (error) {
    detalhe.innerHTML = `<div class="error-message">${escapeHtml(error.message)}</div>`;
  }
}

carregarProduto();
</script>
</body>
</html>
